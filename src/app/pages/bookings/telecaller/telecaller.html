<div class="flex flex-col gap-5">
  <div class="flex justify-between items-center">
    <div>
      <h1 class="text-3xl font-semibold">Telecaller Bookings</h1>
      <p>View and manage all telecaller bookings</p>
    </div>
    <div class="flex gap-3">
      <p-button icon="pi pi-plus" [size]="'small'" label="Follow-up" />
    </div>
  </div>
  <div class="h-[80vh] max-w-[80vw] overflow-x-auto relative">
    <hot-table #hotTable [data]="data" [settings]="gridSettings"> </hot-table>
  </div>
</div>

@if (telecallerBookingsService.telecallerBookings().isLoading) {
  <div class="absolute top-0 left-0 w-full h-full bg-black/5 z-10 flex items-center justify-center">
    <p-progress-spinner />
  </div>
}
<p-paginator
  (onPageChange)="onPageChange($event)"
  [first]="pagination.first"
  [rows]="pagination.limit"
  [totalRecords]="
    (this.searchKey !== ''
      ? telecallerBookingsService.telecallerBookings().data?.totalDocsForFilter
      : telecallerBookingsService.telecallerBookings().data?.totalDocs) ?? 0
  "
  [rowsPerPageOptions]="[10, 20, 50, 100, 500]"
  currentPageReportTemplate="Showing {first} to {last} of {totalRecords} records"
  showCurrentPageReport="true"
/>
<p-toast></p-toast>
<p-confirmpopup></p-confirmpopup>
