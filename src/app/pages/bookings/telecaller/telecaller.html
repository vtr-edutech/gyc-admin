<div class="flex flex-col gap-5">
  <div class="flex justify-between items-center">
    <div>
      <h1 class="text-3xl font-semibold">Telecaller Bookings</h1>
      <p>View and manage all telecaller bookings</p>
    </div>
    <div class="flex gap-3">
      <p-button
        icon="pi pi-plus"
        [size]="'small'"
        label="Follow-up"
        (onClick)="toggleFollowUpModal(true)"
      />
    </div>
  </div>
  <div class="h-[80vh] w-[75vw] overflow-hidden relative">
    <hot-table #hotTable [data]="data" [settings]="gridSettings"> </hot-table>
  </div>
</div>

@if (telecallerBookingsService.telecallerBookings().isLoading) {
  <div class="absolute top-0 left-0 w-full h-full bg-black/5 z-10 flex items-center justify-center">
    <p-progress-spinner />
  </div>
}
<p-paginator
  (onPageChange)="onPageChange($event)"
  [first]="pagination.first"
  [rows]="pagination.limit"
  [totalRecords]="telecallerBookingsService.telecallerBookings().data?.totalDocsForFilter"
  [rowsPerPageOptions]="[10, 20, 50, 100, 500]"
  currentPageReportTemplate="Showing {first} to {last} of {totalRecords} records"
  showCurrentPageReport="true"
/>
<p-toast></p-toast>
<p-confirmpopup></p-confirmpopup>

<p-dialog
  [visible]="isFollowUpModalOpen()"
  (onHide)="toggleFollowUpModal(false)"
  [modal]="true"
  [draggable]="false"
  header="Add follow-up"
  [resizable]="false"
  [style]="{ width: '60%' }"
>
  <app-follow-up-form />
</p-dialog>
