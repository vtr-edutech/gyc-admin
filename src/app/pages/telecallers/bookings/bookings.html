<div class="flex flex-col gap-5">
  <div class="flex justify-between items-center">
    <div>
      <h1 class="text-3xl font-semibold">Telecaller Bookings</h1>
      <p>View and manage all telecaller bookings</p>
    </div>
    <div class="flex gap-3">
      <input type="file" #fileInput name="file" id="file" class="hidden" (change)="handleFileUpload($event)" />
      <p-button
        icon="pi pi-plus"
        [size]="'small'"
        label="Create new booking"
        (onClick)="fileInput.click()"
      />
    </div>
  </div>

  <div class="h-[80vh] overflow-x-auto relative">
    @if (telecallerBookingsService.telecallerBookings().isLoading) {
      <div
        class="absolute top-0 left-0 w-full h-full bg-black/5 z-10 flex items-center justify-center"
      >
        <p-progress-spinner />
      </div>
    }
    <hot-table #hotTable [data]="data" [settings]="gridSettings"> </hot-table>
  </div>
  <p-paginator
    (onPageChange)="onPageChange($event)"
    [first]="first"
    [rows]="limit"
    [totalRecords]="telecallerBookingsService.telecallerBookings().data?.totalDocs ?? 0"
    [rowsPerPageOptions]="[10, 20, 50, 100, 500]"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} records"
    showCurrentPageReport="true"
  />
</div>
