<div class="flex flex-col gap-5">
  <div class="flex justify-between items-center">
    <div>
      <h1 class="text-3xl font-semibold">Telecaller Bookings</h1>
      <p>View and manage all telecaller bookings</p>
    </div>
    <div class="flex gap-3">
      <p-button icon="pi pi-plus" [size]="'small'" label="Create new booking" />
    </div>
  </div>

  <div class="min-h-[80vh] overflow-x-auto">
    <hot-table
      [data]="telecallerBookingsService.telecallerBookings().data?.data"
      [settings]="gridSettings"
    >
    </hot-table>
  </div>
</div>
