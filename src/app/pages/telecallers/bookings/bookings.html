<div class="flex flex-col gap-5">
  <div class="flex justify-between items-center">
    <div>
      <h1 class="text-3xl font-semibold">Telecaller Bookings</h1>
      <p>View and manage all telecaller bookings</p>
    </div>
    <div class="flex gap-3">
      <p-button icon="pi pi-plus" [size]="'small'" label="Create new booking" />
    </div>
  </div>

  <div class="min-h-[80vh] overflow-x-auto relative">
    @if (telecallerBookingsService.telecallerBookings().isLoading) {
      <div
        class="absolute top-0 left-0 w-full h-full bg-black/5 z-10 flex items-center justify-center"
      >
        <p-progress-spinner />
      </div>
    }
    <hot-table #hotTable [data]="data" [settings]="gridSettings"> </hot-table>
  </div>
</div>
